<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0f0f0f;
            color: #e8e8e8;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
        }

        .card-header {
            margin-bottom: 36px;
        }

        .card-header h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #ffffff;
        }

        .card-header p {
            margin-top: 6px;
            font-size: 13px;
            color: #666;
            font-weight: 400;
        }

        .divider {
            height: 1px;
            background: #2a2a2a;
            margin-bottom: 32px;
        }

        .field {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background-color: #111;
            border: 1px solid #2e2e2e;
            border-radius: 8px;
            color: #e8e8e8;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            padding: 11px 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #555;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
        }

        input::placeholder {
            color: #444;
        }

        .submit-btn {
            width: 100%;
            margin-top: 8px;
            background-color: #ffffff;
            color: #0f0f0f;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 12px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            letter-spacing: 0.1px;
        }

        .submit-btn:hover {
            background-color: #e0e0e0;
        }

        .submit-btn:active {
            transform: scale(0.99);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h1>Create an account</h1>
            <p>Fill in your details to get started.</p>
        </div>
        <div class="divider"></div>
        <form action="register" method="POST" autocomplete="off">
            {% csrf_token %}
            <div class="field">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Jane Smith">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••">
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="text" id="email" name="email" placeholder="jane@example.com">
            </div>
            <div class="field">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" placeholder="123 Main St, City">
            </div>
            <input type="submit" class="submit-btn" value="Create account">
        </form>
    </div>
</body>
</html>
